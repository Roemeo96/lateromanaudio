<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <meta
      name="description"
      content="Late Roman Audio – interaktive Simulation des Weltgeist Synthesis Pedals"
    >

    <title>Late Roman Audio – Weltgeist Synthesis</title>

    <link
      rel="icon"
      href='data:image/svg+xml,
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
          <g fill="%23eee8d5">
            <rect x="18" y="8" width="8" height="48"/>
            <rect x="35" y="8" width="8" height="48"/>
            <rect x="53" y="8" width="8" height="48"/>
          </g>
        </svg>'
    >
  </head>

  <body>
    <!-- Landingpage -->
    <section class="landing-hero">
      <div
        class="landing-logo"
        aria-label="Late Roman Audio"
      >
        <div class="text-logo">
          <div>Late</div>
          <div>Roman</div>
          <div>Avdio</div>
        </div>

        <div
          class="logo-symbol"
          aria-hidden="true"
        >
          <div class="logo-bar-group">
            <span></span>
            <span></span>
          </div>

          <div class="logo-bar-group">
            <span></span>
            <span></span>
          </div>

          <div class="logo-bar-group">
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

      <div class="landing-copy">
        <p class="landing-tagline">
          The Dynamics You Lost after Compression
        </p>

        <p class="landing-tagline">
          Reborn as Control
        </p>

        <p class="landing-coming">
          Coming Soon ...
        </p>
      </div>
    </section>

    <!-- Pedalsimulation -->
    <main
      id="pedal-simulation"
      class="app"
    >
      <section class="pedal-panel">
        <header class="pedal-header">
          <p class="brand">Weltgeist</p>
          <h1>Synthesis</h1>
          <p class="subtitle">Interactive transfer curve</p>
        </header>

        <div class="control">
          <div class="control-heading">
            <label for="sensitivity">
              Sensitivity
            </label>

            <output
              id="sensitivity-value"
              for="sensitivity"
            >
              5.0
            </output>
          </div>

          <input
            id="sensitivity"
            type="range"
            min="0.5"
            max="10"
            step="0.1"
            value="5"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="min-output">
              Min
            </label>

            <output
              id="min-output-value"
              for="min-output"
            >
              0.00
            </output>
          </div>

          <input
            id="min-output"
            type="range"
            min="0"
            max="5"
            step="0.05"
            value="0"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="max-output">
              Max
            </label>

            <output
              id="max-output-value"
              for="max-output"
            >
              5.00
            </output>
          </div>

          <input
            id="max-output"
            type="range"
            min="0"
            max="5"
            step="0.05"
            value="5"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="threshold">
              Threshold
            </label>

            <output
              id="threshold-value"
              for="threshold"
            >
              2.50
            </output>
          </div>

          <input
            id="threshold"
            type="range"
            min="0"
            max="5"
            step="0.05"
            value="2.5"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="ratio">
              Ratio
            </label>

            <output
              id="ratio-value"
              for="ratio"
            >
              1.00
            </output>
          </div>

          <input
            id="ratio"
            type="range"
            min="0.5"
            max="2"
            step="0.05"
            value="1"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="attack">
              Attack
            </label>

            <output
              id="attack-value"
              for="attack"
            >
              250 ms
            </output>
          </div>

          <input
            id="attack"
            type="range"
            min="10"
            max="1000"
            step="10"
            value="250"
          >
        </div>

        <div class="control">
          <div class="control-heading">
            <label for="release">
              Release
            </label>

            <output
              id="release-value"
              for="release"
            >
              500 ms
            </output>
          </div>

          <input
            id="release"
            type="range"
            min="10"
            max="4000"
            step="10"
            value="500"
          >
        </div>
      </section>

      <section class="visualization-panel">
        <header class="visualization-header">
          <div>
            <p class="eyebrow">Transfer function</p>
            <h2>Amplitude to control voltage</h2>
          </div>

          <div class="control">
            <div class="control-heading">
              <label for="input-level">
                Input Level
              </label>

              <output
                id="input-level-value"
                for="input-level"
              >
                0.50
              </output>
            </div>

            <input
              id="input-level"
              type="range"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
            >
          </div>

          <dl class="live-values">
            <div>
              <dt>Input</dt>
              <dd id="current-input">0.00</dd>
            </div>

            <div>
              <dt>Output</dt>
              <dd id="current-output">0.00</dd>
            </div>
          </dl>
        </header>

        <div class="chart-container">
          <svg
            id="transfer-chart"
            role="img"
            aria-label="Kennlinie des Pedals"
          ></svg>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="/src/main.js"
    ></script>
  </body>
</html>
